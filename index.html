<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Computer Graphics Assignment</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>
body { margin:0; }
</style>

</head>

<body>

<a-scene renderer="antialias:true; shadowMapEnabled:true" vr-mode-ui="enabled:true">

<!-- ROMANTIC EVENING SKY -->
<a-sky color="#1a0f0a"></a-sky>

<!-- AMBIENT LIGHTING -->
<a-light type="ambient" intensity="0.3" color="#ff9966"></a-light>

<!-- ROMANTIC CANDLELIGHT -->
<a-light
type="point"
position="0 1.5 -3"
intensity="0.8"
color="#ffaa55"
castShadow="true">
</a-light>

<!-- SOFT FILL LIGHT -->
<a-light
type="directional"
position="2 8 2"
intensity="0.4"
color="#ffcc88">
</a-light>

<!-- GRASS GROUND -->
<a-plane rotation="-90 0 0"
width="50"
height="50"
color="#2d5a2d"
shadow="receive:true">
</a-plane>

<!-- GAZEBO FLOOR -->
<a-cylinder
position="0 0.25 -3"
radius="3.5"
height="0.5"
color="#4a3c2a"
shadow="receive:true">
</a-cylinder>

<!-- GAZEBO RAILING -->
<a-torus
position="0 0.8 -3"
radius="3.2"
radius-tubular="0.05"
color="#5a4a3a">
</a-torus>

<!-- PILLARS -->
<a-cylinder position="-3 2.5 -0.5" radius="0.15" height="5" color="#3d2f1f" shadow="cast:true"></a-cylinder>
<a-cylinder position="3 2.5 -0.5" radius="0.15" height="5" color="#3d2f1f" shadow="cast:true"></a-cylinder>
<a-cylinder position="-3 2.5 -5.5" radius="0.15" height="5" color="#3d2f1f" shadow="cast:true"></a-cylinder>
<a-cylinder position="3 2.5 -5.5" radius="0.15" height="5" color="#3d2f1f" shadow="cast:true"></a-cylinder>

<!-- ROOF -->
<a-cone
position="0 5.5 -3"
radius-bottom="3.8"
height="2.5"
color="#2a4a2a"
shadow="cast:true">
</a-cone>

<!-- DECORATIVE ROOF TRIM -->
<a-torus
position="0 4.8 -3"
radius="3.6"
radius-tubular="0.08"
color="#3a5a3a">
</a-torus>

<!-- TABLE -->
<a-cylinder
position="0 1.2 -3"
radius="1.2"
height="0.15"
color="#6b4423"
shadow="cast:true;receive:true">
</a-cylinder>

<a-cylinder
position="0 0.6 -3"
radius="0.15"
height="1.2"
color="#5a3419"
shadow="cast:true">
</a-cylinder>

<!-- ROMANTIC TABLE DECORATIONS -->
<a-cylinder
position="0 1.3 -3"
radius="0.08"
height="0.3"
color="#8b4513"
shadow="cast:true">
</a-cylinder>

<!-- CANDLE -->
<a-cylinder
position="0 1.5 -3"
radius="0.03"
height="0.2"
color="#fff8dc"
shadow="cast:true">
</a-cylinder>

<!-- CANDLE FLAME -->
<a-sphere
position="0 1.65 -3"
radius="0.05"
color="#ff6600"
material="emissive:#ff6600;emissiveIntensity:2">
</a-sphere>

<!-- MILO TIN -->
<a-cylinder
position="-0.6 1.35 -3"
radius="0.2"
height="0.45"
color="#0d4a10"
shadow="cast:true">
</a-cylinder>

<a-cylinder
position="-0.6 1.43 -3"
radius="0.21"
height="0.05"
color="#ffd700"
shadow="cast:true">
</a-cylinder>

<!-- MILK TIN -->
<a-cylinder
position="0.6 1.35 -3"
radius="0.2"
height="0.45"
color="#f5deb3"
shadow="cast:true">
</a-cylinder>

<a-cylinder
position="0.6 1.43 -3"
radius="0.21"
height="0.05"
color="#4169e1"
shadow="cast:true">
</a-cylinder>

<!-- CUPS WITH SAUCERS -->
<!-- Cup 1 -->
<a-cylinder
position="-0.8 1.28 -2.6"
radius="0.15"
height="0.03"
color="#f5f5dc"
shadow="cast:true">
</a-cylinder>

<a-cylinder
position="-0.8 1.35 -2.6"
radius="0.08"
height="0.15"
color="#ffffff"
shadow="cast:true">
</a-cylinder>

<!-- Cup 2 -->
<a-cylinder
position="0.8 1.28 -3.4"
radius="0.15"
height="0.03"
color="#f5f5dc"
shadow="cast:true">
</a-cylinder>

<a-cylinder
position="0.8 1.35 -3.4"
radius="0.08"
height="0.15"
color="#ffffff"
shadow="cast:true">
</a-cylinder>

<!-- STEAM EFFECTS -->
<a-sphere
position="-0.8 1.5 -2.6"
radius="0.02"
color="#ffffff"
material="transparent:true;opacity:0.3"
animation="property:position;to:-0.8 1.8 -2.6;dur:3000;easing:easeOut;dir:normal;loop:true">
</a-sphere>

<a-sphere
position="0.8 1.5 -3.4"
radius="0.02"
color="#ffffff"
material="transparent:true;opacity:0.3"
animation="property:position;to:0.8 1.8 -3.4;dur:3000;easing:easeOut;dir:normal;loop:true">
</a-sphere>

<!-- ROMANTIC CHAIRS -->
<!-- Chair 1 -->
<a-box position="-2.2 0.6 -3" width="0.8" height="0.1" depth="0.8" color="#8b4513" shadow="cast:true;receive:true"></a-box>
<a-box position="-2.2 1.1 -3.4" width="0.8" height="1" depth="0.1" color="#8b4513" shadow="cast:true"></a-box>
<a-cylinder position="-1.8 0.3 -2.6" radius="0.05" height="0.6" color="#654321" shadow="cast:true"></a-cylinder>
<a-cylinder position="-2.6 0.3 -2.6" radius="0.05" height="0.6" color="#654321" shadow="cast:true"></a-cylinder>
<a-cylinder position="-1.8 0.3 -3.4" radius="0.05" height="0.6" color="#654321" shadow="cast:true"></a-cylinder>
<a-cylinder position="-2.6 0.3 -3.4" radius="0.05" height="0.6" color="#654321" shadow="cast:true"></a-cylinder>

<!-- Chair 2 -->
<a-box position="2.2 0.6 -3" width="0.8" height="0.1" depth="0.8" color="#8b4513" shadow="cast:true;receive:true"></a-box>
<a-box position="2.2 1.1 -2.6" width="0.8" height="1" depth="0.1" color="#8b4513" shadow="cast:true"></a-box>
<a-cylinder position="1.8 0.3 -2.6" radius="0.05" height="0.6" color="#654321" shadow="cast:true"></a-cylinder>
<a-cylinder position="2.6 0.3 -2.6" radius="0.05" height="0.6" color="#654321" shadow="cast:true"></a-cylinder>
<a-cylinder position="1.8 0.3 -3.4" radius="0.05" height="0.6" color="#654321" shadow="cast:true"></a-cylinder>
<a-cylinder position="2.6 0.3 -3.4" radius="0.05" height="0.6" color="#654321" shadow="cast:true"></a-cylinder>

<!-- ROMANTIC FLOWER DECORATIONS -->
<a-cylinder
position="-1 1.3 -3"
radius="0.03"
height="0.25"
color="#228b22">
</a-cylinder>

<a-sphere
position="-1 1.45 -3"
radius="0.08"
color="#ff69b4">
</a-sphere>

<a-cylinder
position="1 1.3 -3"
radius="0.03"
height="0.25"
color="#228b22">
</a-cylinder>

<a-sphere
position="1 1.45 -3"
radius="0.08"
color="#ff1493">
</a-cylinder>

<!-- HANGING LANTERNS -->
<a-sphere
position="-2 4.2 -3"
radius="0.15"
color="#ffaa55"
material="emissive:#ff6600;emissiveIntensity:0.5"
shadow="cast:true">
</a-sphere>

<a-sphere
position="2 4.2 -3"
radius="0.15"
color="#ffaa55"
material="emissive:#ff6600;emissiveIntensity:0.5"
shadow="cast:true">
</a-sphere>

<!-- CAMERA -->
<a-entity position="0 1.6 6">

<a-camera
wasd-controls="acceleration:40"
look-controls="pointerLockEnabled:true">

<a-cursor rayOrigin="mouse"></a-cursor>

</a-camera>

</a-entity>

</a-scene>

</body>
</html>
